<!DOCTYPE html>
<html lang="pt-BR">
<!-- HTML Para o Login -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema ESI</title>
    <link rel="icon" type="image/png" href="https://esienergia.com.br/wp-content/uploads/2024/02/favicon5.png">
    <link rel="stylesheet" href="/public/dist/login.min.css?v=20260323-3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        window.__APP_CONFIG_OVERRIDES__ = {
            mode: 'client',
            auth: {
                required: true,
                loginPage: '/login',
                redirectAfterLogin: '/obras/create'
            },
            features: {
                empresaAutocomplete: false,
                filtros: false,
                editDataNavigation: false,
                shutdown: false
            }
        };
    </script>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="https://esienergia.com.br/wp-content/uploads/2024/02/favicon5.png"
                    alt="Logo ESI Energia" class="login-logo">
                <h1 class="login-title">Acesso ao Sistema</h1>
                <p class="login-subtitle">Entre com usuário e o token de acesso</p>
            </div>

            <form class="login-form" id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label for="username" class="input-label">
                        <i class="fas fa-user"></i>
                        Usuário
                    </label>
                    <input type="text"
                           id="username"
                           name="username"
                           class="input-field"
                           placeholder="Digite seu usuário"
                           autocomplete="off"
                           required>
                </div>

                <div class="input-group">
                    <label for="password" class="input-label">
                        <i class="fas fa-lock"></i>
                        Token
                    </label>
                    <div class="password-field-wrapper">
                        <input type="password"
                               id="password"
                               name="password"
                               class="input-field"
                               placeholder="Digite sua senha ou token"
                               autocomplete="off"
                               required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="login-options">
                    <button type="button" class="forgot-password" id="openRecoveryModalBtn">
                        Esqueci o token
                    </button>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    <span class="btn-text">Entrar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                <p class="footer-text" id="loginFeedback"></p>
                <p class="footer-version">@Vfrios-Github</p>
            </div>
        </div>

        <div class="login-background">
            <div class="bg-shape bg-shape-1"></div>
            <div class="bg-shape bg-shape-2"></div>
            <div class="bg-shape bg-shape-3"></div>
        </div>
    </div>

    <div class="modal hidden" id="recoverTokenModal">
        <div class="modal-content recover-modal">
            <div class="modal-header">
                <div class="modal-icon">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h3 class="modal-title">Recuperar Token</h3>
                <button type="button" class="modal-close" id="closeRecoveryModalBtn" aria-label="Fechar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <p class="modal-description">
                Informe o tipo de acesso, o usuário e o email cadastrado para receber o token atual.
            </p>

            <form class="recover-form" id="recoverTokenForm" autocomplete="off">

                <div class="input-group">
                    <label for="recoveryUsername" class="input-label">
                        <i class="fas fa-user"></i>
                        Usuário
                    </label>
                    <input type="text" id="recoveryUsername" class="input-field" placeholder="Digite o usuário cadastrado" required>
                </div>

                <div class="input-group">
                    <label for="recoveryEmail" class="input-label">
                        <i class="fas fa-at"></i>
                        Email de recuperação
                    </label>
                    <input type="email" id="recoveryEmail" class="input-field" placeholder="Digite o email cadastrado" required>
                </div>

                <p class="footer-text" id="recoverTokenFeedback"></p>

                <div class="modal-actions">
                    <button type="button" class="modal-btn btn-cancel" id="cancelRecoveryBtn">Cancelar</button>
                    <button type="submit" class="modal-btn btn-send" id="sendRecoveryBtn">
                        <span class="btn-text">Enviar token</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>

            <div class="recover-footer">
                <i class="fas fa-shield-alt"></i>
                <span>Para recuperar o token de acesso o email precisa estar cadastrado</span>
            </div>
        </div>
    </div>

    <script defer src="/public/dist/client-login.min.js?v=20260323-2"></script>
</body>

</html>
