services:
  - type: web
    name: obra-system
    runtime: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: |
      pip install --upgrade pip
      pip install setuptools==68.2.2
      pip install -r requirements.txt
    startCommand: python codigo/servidor.py
    healthCheckPath: /health-check
    envVars:
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
